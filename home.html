<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUPIS Cafe Home</title>
    <link rel="icon" type="image/jpeg" href="images/kupis-logo.jpg" />
    <style>
      :root {
        --primary: #1f3d0a;
        --secondary: #2f5a12;
        --accent: #7fa35a;
        --bg-start: #f4f3ee;
        --bg-end: #edebe4;
        --card: #ffffff;
        --text-primary: #1a1a1a;
        --text-secondary: #6b6b6b;
        --stroke: #dfe4d7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
        color: var(--text-primary);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .home-card {
        width: min(760px, 100%);
        padding: clamp(24px, 4vw, 48px);
        border: 1px solid var(--stroke);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 10px 22px rgba(31, 61, 10, 0.1);
      }

      .eyebrow {
        margin: 0;
        color: var(--secondary);
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 12px 0;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.06;
      }

      p {
        margin: 0 0 24px;
        max-width: 60ch;
        font-size: 1.08rem;
        line-height: 1.7;
        color: var(--text-secondary);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 22px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 800;
        transition: transform 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      }

      .button--primary {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 10px 20px rgba(31, 61, 10, 0.16);
      }

      .button--primary:hover {
        transform: translateY(-1px);
        background: var(--secondary);
      }

      .button--ghost {
        border: 1px solid rgba(31, 61, 10, 0.18);
        background: var(--card);
        color: var(--secondary);
      }

      .button--ghost:hover {
        transform: translateY(-1px);
        background: rgba(127, 163, 90, 0.08);
      }
    </style>
  </head>
  <body>
    <main class="home-card" aria-label="KUPIS Cafe Home Page">
      <p class="eyebrow">Welcome to Kupis Cafe</p>
      <h1>Fresh Brewed Moments, Every Day.</h1>
      <p>
        Coffee and Dessert. Use the menu button below to view all cafe items,
        categories, and product detail previews.
      </p>
      <div class="actions">
        <a class="button button--primary" href="index.html">Open Menu</a>
      </div>
    </main>
  </body>
</html>
